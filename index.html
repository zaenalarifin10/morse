<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Morse Sender</title>
    <style>
        body { font-family: Arial; text-align: center; margin-top: 50px; background: #121212; color: white; }
        .btn { width: 80%; height: 150px; font-size: 24px; background: #ff4757; color: white; border: none; border-radius: 10px; }
        .btn:active { background: #ff6b81; }
    </style>
</head>
<body>
    <h2>User 1: Pengirim Morse</h2>
    <button id="pad" class="btn">TEKAN DI SINI</button>
    <p>Ketuk cepat untuk titik (.), tahan untuk garis (-)</p>

    <script>
        let pad = document.getElementById('pad');
        let start, morse = "";

        pad.addEventListener('touchstart', (e) => {
            e.preventDefault();
            start = Date.now();
        });

        pad.addEventListener('touchend', () => {
            let diff = Date.now() - start;
            morse += (diff < 250) ? "." : "-";
            
            // Mengirim kode ke SHTTPS menggunakan metode POST (jika dikonfigurasi)
            // Untuk uji coba lokal, data disimpan sementara di localStorage browser bersama
            localStorage.setItem('raw_morse', morse);
        });
    </script>
</body>
</html>
